name: build-apps

# Manual "try a build" runs + automatic builds attached to a tagged release.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write        # needed to attach artifacts to a Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: OpenDiag-macos
            bundle: OpenDiag.app
          - os: windows-latest
            artifact: OpenDiag-windows
            bundle: OpenDiag.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywebview pyserial segno

      - name: Build frozen app
        run: pyinstaller --noconfirm kline-diag.spec

      - name: Package artifact
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" = "macOS" ]; then
            zip -r "../${{ matrix.artifact }}.zip" "${{ matrix.bundle }}"
          else
            7z a "../${{ matrix.artifact }}.zip" "${{ matrix.bundle }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error

      - name: Attach to Release (tagged builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
